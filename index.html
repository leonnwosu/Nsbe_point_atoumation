<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Points Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Conference Points Calculator</h1>
  <p class="muted"> Upload CSVs, calculate, then download the updated file.</p>

  <div class="row">
    <div class="card">
      <label>counted_points file (FullName/Name, Points) Column name must match</label>
      <input id="countedFile" type="file" accept=".csv,.txt,.xls,.xlsx,.xlsm,.xlsb,.ods,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
      <label>attendance file (FullName/Name, ...) Column name must match</label>
      <input id="addFile" type="file" accept=".csv,.txt,.xls,.xlsx,.xlsm,.xlsb,.ods,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
      <label>Event type</label>
      <select id="eventType"></select>
      <button id="calcBtn">Calculate</button>
      <button id="downloadBtn" disabled>Download updated counted_points.csv</button>
      <div id="status" class="muted"></div>
      <div id="err" class="error"></div>
      <div class="muted"><strong>Attendees not found in counted_points:</strong></div>
      <div id="notFound" class="muted">—</div>
    </div>

    <div class="card">
      <h3>Preview (first 25 rows)</h3>
      <div id="preview" class="muted">—</div>
    </div>
  </div>

  <script src="logic.js"></script>
</body>
</html>
